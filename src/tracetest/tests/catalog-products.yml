type: Test
spec:
  id: catalog-products
  name: Catalog - GET /catalog/products produces traces
  description: Verifies that the catalog service emits OTLP traces when the products endpoint is called
  trigger:
    type: http
    httpRequest:
      method: GET
      url: http://catalog:8080/catalog/products
  specs:
    - selector: span[tracetest.span.type="http" name="GET /catalog/products"]
      name: HTTP span exists with correct attributes
      assertions:
        - attr:http.status_code = 200
        - attr:http.method = "GET"
    - selector: span[tracetest.span.type="database"]
      name: Database span exists showing SQL query was traced
      assertions:
        - attr:db.system exists
