name: Reusable Build and Push

on:
  workflow_call:
    inputs:
      services_matrix:
        description: "JSON array of changed services"
        required: true
        type: string
      version:
        description: "Version, tag, or SHA used for image tagging"
        required: true
        type: string
      target_arch:
        description: "Target architecture suffix in image tag"
        required: false
        default: "amd64"
        type: string
      aws_region:
        description: "AWS region for ECR operations"
        required: false
        default: "ap-southeast-1"
        type: string
      aws_ecr_repository:
        description: "Base ECR repository endpoint"
        required: true
        type: string
      push_to_ecr:
        description: "Whether to push built images to ECR after scan"
        required: false
        default: true
        type: boolean
    secrets:
      AWS_ROLE_ARN:
        required: true

jobs:
  build-and-push:
    name: Build, Scan, and Push Images
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(inputs.services_matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}

      - name: Setup Docker
        uses: ./.github/actions/setup-docker

      - name: Setup Env
        uses: ./.github/actions/setup-env

      - name: Configure AWS credentials
        if: ${{ inputs.push_to_ecr }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}
          role-session-name: GithubActionsSession

      - name: Login to Amazon ECR Private
        if: ${{ inputs.push_to_ecr }}
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist
        if: ${{ inputs.push_to_ecr }}
        run: |
          set -euo pipefail

          repository_name="ecommerce/${{ matrix.service }}"

          if aws ecr describe-repositories --repository-names "$repository_name" >/dev/null 2>&1; then
            echo "ECR repository exists: $repository_name"
          else
            echo "Creating ECR repository: $repository_name"
            aws ecr create-repository --repository-name "$repository_name" >/dev/null
          fi

      - name: Build image for Trivy scan
        id: build-image
        env:
          TAG_NAME: ${{ inputs.version }}
          TARGET_ARCH: ${{ inputs.target_arch }}
          AWS_ECR_REPOSITORY: ${{ inputs.aws_ecr_repository }}
        run: |
          set -euo pipefail

          IMAGE_TAG=${TAG_NAME#v}
          if [ "${{ matrix.service }}" = "load-generator" ]; then
            image_ref="${AWS_ECR_REPOSITORY}/ecommerce/load-generator:load-gen.${IMAGE_TAG}-${TARGET_ARCH}"
            yarn nx container load-generator --load true --tags "$image_ref"
          else
            image_ref="${AWS_ECR_REPOSITORY}/ecommerce/${{ matrix.service }}:${IMAGE_TAG}-${TARGET_ARCH}"
            yarn nx container "${{ matrix.service }}" --load true --tags "$image_ref"
          fi

          echo "image_ref=$image_ref" >> "$GITHUB_OUTPUT"

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.build-image.outputs.image_ref }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Push changed images
        if: ${{ inputs.push_to_ecr }}
        run: |
          set -euo pipefail

          echo "Pushing ${{ steps.build-image.outputs.image_ref }}"
          docker push "${{ steps.build-image.outputs.image_ref }}"
