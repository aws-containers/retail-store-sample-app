name: App CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Unit and Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Env
        uses: ./.github/actions/setup-env

      - name: Build
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            yarn nx affected --targets=build --base origin/main --parallel 1
          else
            yarn nx run-many -t build --projects=tag:service --parallel 1
          fi

      - name: Unit Tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            yarn nx affected --targets=test --base origin/main
          else
            yarn nx run-many -t test --projects=tag:service
          fi

      - name: Integration Tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            yarn nx affected --targets=test:integration --base origin/main
          else
            yarn nx run-many -t test:integration --projects=tag:service
          fi

  container-build:
    name: Build Service Images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker
        uses: ./.github/actions/setup-docker

      - name: Setup Env
        uses: ./.github/actions/setup-env

      - name: Build images (no push)
        env:
          IMAGE_TAG: ci-${{ github.sha }}
        run: |
          yarn nx run-many -t container --projects=catalog,cart,orders,checkout,ui --tags local/retail-store-sample-{projectName}:${IMAGE_TAG}

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scanners: vuln
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Upload scan results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
