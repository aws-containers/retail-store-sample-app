name: CI

on:
  push:
    # Real image build and publish flow when changes land on main.
    branches:
      - "main"
  workflow_dispatch:
    inputs:
      version:
        description: "Version, tag, or SHA"
        required: false
        default: ""

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  resolve-version:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
    steps:
      - name: Resolve version
        id: vars
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      changed_services_matrix: ${{ steps.set-matrix.outputs.changed_services_matrix }}
      any_service_changed: ${{ steps.set-matrix.outputs.any_service_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Filter changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            cart:
              - 'src/cart/**'
            catalog:
              - 'src/catalog/**'
            checkout:
              - 'src/checkout/**'
            orders:
              - 'src/orders/**'
            ui:
              - 'src/ui/**'
            load-generator:
              - 'src/load-generator/**'
            shared:
              - '.github/workflows/**'
              - '.github/actions/**'
              - 'nx.json'
              - 'package.json'
              - 'yarn.lock'
              - 'src/app/**'
      - name: Build changed-service matrix
        id: set-matrix
        run: |
          set -euo pipefail

          full_services=(
            cart
            catalog
            checkout
            orders
            ui
            load-generator
          )

          changed_services=()

          if [[ "${{ steps.changes.outputs.shared }}" == "true" ]]; then
            changed_services=("${full_services[@]}")
          else
            [[ "${{ steps.changes.outputs.cart }}" == "true" ]] && changed_services+=("cart")
            [[ "${{ steps.changes.outputs.catalog }}" == "true" ]] && changed_services+=("catalog")
            [[ "${{ steps.changes.outputs.checkout }}" == "true" ]] && changed_services+=("checkout")
            [[ "${{ steps.changes.outputs.orders }}" == "true" ]] && changed_services+=("orders")
            [[ "${{ steps.changes.outputs.ui }}" == "true" ]] && changed_services+=("ui")
            [[ "${{ steps.changes.outputs.load-generator }}" == "true" ]] && changed_services+=("load-generator")
          fi

          if [[ ${#changed_services[@]} -eq 0 ]]; then
            echo "changed_services_matrix=[]" >> "$GITHUB_OUTPUT"
            echo "any_service_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          matrix_json="$(printf '%s\n' "${changed_services[@]}" | jq -R . | jq -sc .)"
          echo "changed_services_matrix=$matrix_json" >> "$GITHUB_OUTPUT"
          echo "any_service_changed=true" >> "$GITHUB_OUTPUT"

  build:
    name: Build Images
    needs:
      - resolve-version
      - detect-changes
    if: needs.detect-changes.outputs.any_service_changed == 'true'
    uses: ./.github/workflows/r-build-scan-push.yml
    with:
      services_matrix: ${{ needs.detect-changes.outputs.changed_services_matrix }}
      version: ${{ needs.resolve-version.outputs.version }}
      target_arch: amd64
      aws_region: ${{ vars.AWS_REGION || 'ap-southeast-1' }}
      aws_ecr_repository: ${{ vars.AWS_ECR_REPOSITORY }}
    secrets: inherit

  handoff-gitops:
    name: Handoff To GitOps Main
    needs:
      - build
      - resolve-version
      - detect-changes
    if: needs.detect-changes.outputs.any_service_changed == 'true'
    runs-on: ubuntu-latest
    env:
      GITOPS_REPO: ${{ github.repository_owner }}/ecommerce-gitops
      GITOPS_VALUES_BASE: services
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-version.outputs.version }}

      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          ref: main
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Update image tags in GitOps repo
        env:
          SERVICES_JSON: ${{ needs.detect-changes.outputs.changed_services_matrix }}
          TAG_NAME: ${{ needs.resolve-version.outputs.version }}
        run: |
          set -euo pipefail

          IMAGE_TAG="${TAG_NAME#v}"
          changed_any=false

          while IFS= read -r service; do
            [ -z "$service" ] && continue
            values_file="gitops/${GITOPS_VALUES_BASE}/${service}/values.yaml"

            if [ ! -f "$values_file" ]; then
              echo "Skip missing values file: $values_file"
              continue
            fi

            export IMAGE_TAG
            yq -i '.image.tag = strenv(IMAGE_TAG)' "$values_file"

            changed_any=true
            echo "Updated $values_file"
          done < <(echo "$SERVICES_JSON" | jq -r '.[]')

          if [ "$changed_any" = "false" ]; then
            echo "No services to update"
            exit 0
          fi

          echo "### GitOps handoff candidates" >> "$GITHUB_STEP_SUMMARY"
          echo "Tag: ${IMAGE_TAG}" >> "$GITHUB_STEP_SUMMARY"
          echo "- values base: ${GITOPS_VALUES_BASE}" >> "$GITHUB_STEP_SUMMARY"

      - name: Commit and push GitOps changes
        env:
          TAG_NAME: ${{ needs.resolve-version.outputs.version }}
        run: |
          set -euo pipefail

          cd gitops
          git config user.name "ecommerce-cd-bot"
          git config user.email "ecommerce-cd-bot@users.noreply.github.com"

          mapfile -t changed_files < <(git diff --name-only -- 'services/*/values.yaml')

          if [ ${#changed_files[@]} -eq 0 ]; then
            echo "No GitOps changes detected"
            exit 0
          fi

          echo "### GitOps files updated" >> "$GITHUB_STEP_SUMMARY"
          for file in "${changed_files[@]}"; do
            echo "- ${file}" >> "$GITHUB_STEP_SUMMARY"
          done

          git add -- "${changed_files[@]}"
          git commit -m "chore(cd): sync image tags from ${TAG_NAME}"
          git push origin main
