version: 2.1

# Визначаємо кроки для перевірки Go-проекту
jobs:
  build_and_test:
    docker:
      # Використовуємо офіційний образ CircleCI для Go
      - image: cimg/go:1.21 
    steps:
      - checkout # Завантажуємо код з GitHub

      - restore_cache:
          name: Відновлення кешу залежностей
          keys:
            - go-mod-v4-{{ checksum "go.sum" }}

      - run:
          name: Завантаження залежностей
          command: go mod download

      - save_cache:
          name: Збереження кешу залежностей
          key: go-mod-v4-{{ checksum "go.sum" }}
          paths:
            - "/go/pkg/mod"

      - run:
          name: Перевірка синтаксису та збірка
          command: go build -v ./...

      - run:
          name: Запуск тестів
          command: go test -v ./...

# Описуємо запуск процесу
workflows:
  main_workflow:
    jobs:
      - build_and_test
